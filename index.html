<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2010 YouTube Player - Native SWF Loader</title>
    <style>
        body {
            background-color: #ffffff;
            color: #333333;
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .video-wrapper {
            width: 640px;
            height: 390px;
            background-color: #000000;
        }
    </style>
</head>
<body>

    <div class="video-wrapper" id="player-target">
        <!-- Embedded application targets stream directly below -->
    </div>

    <script type="text/javascript">
        // 1. Process link parameter string (?file=yourasset.swf) safely for old machines
        var urlParams = {};
        window.location.search.replace(/[?&]+([^=&]+)=([^&]*)/gi, function(str, key, value) {
            urlParams[key] = value;
        });

        // Default fallback asset file name
        var targetSWF = urlParams['file'] || 'animation.swf';

        // 2. Format localized system variables targeting the internal flash config bypass mapping
        // We override the default youtube domain lookup to force local repository text scanning
        var flashvars = "video_id=1" +
                        "&el=embedded" +
                        "&gl=US" +
                        "&hl=en" +
                        "&as_configured=1" +
                        "&eurl=" + encodeURIComponent(window.location.href) +
                        "&t=1" +
                        "&is_embedded=1" +
                        "&allow_embed=1" +
                        "&cr=US";

        var container = document.getElementById('player-target');
        
        container.innerHTML = 
            '<!-- ActiveX Plugin Mapping (Internet Explorer) --> ' +
            '<object classid="clsid:D27CDB6E-AE6D-11cf-96B8-444553540000" width="640" height="390"> ' +
                '<param name="movie" value="player_as3.swf" /> ' +
                '<param name="allowScriptAccess" value="always" /> ' +
                '<param name="allowFullScreen" value="true" /> ' +
                '<param name="quality" value="high" /> ' +
                '<param name="bgcolor" value="#000000" /> ' +
                '<param name="flashvars" value="' + flashvars + '" /> ' +
                '<!-- Standard Plugin Mapping (Firefox / Chrome / Safari / Ruffle) --> ' +
                '<!--[if !IE]>--> ' +
                '<object type="application/x-shockwave-flash" data="player_as3.swf" width="640" height="390"> ' +
                    '<param name="allowScriptAccess" value="always" /> ' +
                    '<param name="allowFullScreen" value="true" /> ' +
                    '<param name="quality" value="high" /> ' +
                    '<param name="bgcolor" value="#000000" /> ' +
                    '<param name="flashvars" value="' + flashvars + '" /> ' +
                '<!--<![endif]--> ' +
                    '<div style="color:white; padding:20px; text-align:center;">Requires Adobe Flash Player or Ruffle Engine.</div> ' +
                '<!--[if !IE]>--> ' +
                '</object> ' +
                '<!--<![endif]--> ' +
            '</object>';
    </script>

    <!-- Automated emulator loader to ensure accessibility on modern devices viewing your project -->
    <script src="https://unpkg.com"></script>

</body>
</html>
