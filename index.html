<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2010 YouTube Player Linker</title>
    <style>
        body {
            background-color: #ffffff;
            color: #333333;
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .video-wrapper {
            width: 640px;
            height: 390px;
            background-color: #000000;
        }
    </style>
</head>
<body>

    <div class="video-wrapper" id="player-target">
        <!-- The script below will instantly generate the Flash code here -->
    </div>

    <script type="text/javascript">
        // 1. Grab the "file" value right from your browser's URL bar
        var urlParams = {};
        window.location.search.replace(/[?&]+([^=&]+)=([^&]*)/gi, function(str, key, value) {
            urlParams[key] = value;
        });

        // 2. Default to "video.mp4" if you forget to type a file name in the link
        var videoFile = urlParams['file'] || 'video.mp4';

        // 3. Build the classic dual-object code to support modern Ruffle AND Windows XP
        var container = document.getElementById('player-target');
        
        var flashvars = "video_id=1&eurl=http://localhost/&el=embedded&gl=US&hl=en&as_configured=1&sendto=http://localhost&innertube_context_client_version=1&t=1";


        container.innerHTML = 
            '<!-- Internet Explorer / ActiveX --> ' +
            '<object classid="clsid:D27CDB6E-AE6D-11cf-96B8-444553540000" width="640" height="390"> ' +
                '<param name="movie" value="player_as3.swf" /> ' +
                '<param name="allowScriptAccess" value="always" /> ' +
                '<param name="allowFullScreen" value="true" /> ' +
                '<param name="quality" value="high" /> ' +
                '<param name="bgcolor" value="#000000" /> ' +
                '<param name="flashvars" value="' + flashvars + '" /> ' +
                '<!-- Firefox / Chrome / Safari / Ruffle --> ' +
                '<!--[if !IE]>--> ' +
                '<object type="application/x-shockwave-flash" data="player_as3.swf" width="640" height="390"> ' +
                    '<param name="allowScriptAccess" value="always" /> ' +
                    '<param name="allowFullScreen" value="true" /> ' +
                    '<param name="quality" value="high" /> ' +
                    '<param name="bgcolor" value="#000000" /> ' +
                    '<param name="flashvars" value="' + flashvars + '" /> ' +
                '<!--<![endif]--> ' +
                    '<div style="color:white; padding:20px;">Flash Player or Ruffle extension required.</div> ' +
                '<!--[if !IE]>--> ' +
                '</object> ' +
                '<!--<![endif]--> ' +
            '</object>';
    </script>

</body>
</html>
